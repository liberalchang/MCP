# MCP服务扩展配置文件
# 用于快速添加新的MCP服务到docker-compose.yml

# 新增MCP服务的模板配置：
#
# 1. 在docker-compose.yml的volumes部分添加：
#    - ./new-mcp-service:/app/new-mcp-service
#
# 2. 在docker-compose.yml的ports部分添加：
#    - "13002:8001"  # 新服务端口映射
#
# 3. 在启动命令中添加新服务启动：
#    # 启动新MCP服务
#    cd /app/new-mcp-service &&
#    pip install -r requirements.txt &&
#    nohup python new_mcp_server.py > /var/log/new-mcp.log 2>&1 &
#
# 4. 在config目录创建对应的环境配置文件：
#    new-mcp-service.env

# 已规划的MCP服务端口分配：
# 13001: Daily Hot MCP (8000)
# 13002: File Manager MCP (8001) - 预留
# 13003: Database MCP (8002) - 预留  
# 13004: Web Scraper MCP (8003) - 预留
# 13005: Code Analyzer MCP (8004) - 预留
